name: Publish Python Package TestPyPi

permissions:
  contents: write

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  prepare:
    name: Prepare version + commit bump
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    outputs:
      clean_tag: ${{ steps.get_tag.outputs.clean_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          git fetch --tags
          raw_tag=$(git tag -l | sort -V | tail -n 1)
          clean_tag=$(echo "$raw_tag" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')

          echo "raw_tag=$raw_tag" >> $GITHUB_OUTPUT
          echo "clean_tag=$clean_tag" >> $GITHUB_OUTPUT

      - name: Output tags
        run: |
          echo "Raw tag: ${{ steps.get_tag.outputs.raw_tag }}"
          echo "Clean SemVer: ${{ steps.get_tag.outputs.clean_tag }}"

      - name: Update version in pyproject.toml
        run: |
          VERSION="${{ steps.get_tag.outputs.clean_tag }}"
          FILE="pyproject.toml"

          CURRENT=$(grep -E '^version =' $FILE | sed 's/version = "\(.*\)"/\1/')

          if [ "$CURRENT" = "$VERSION" ]; then
            echo "Version unchanged. Aborting."
            exit 1
          fi

          python3 - <<EOF
          import sys
          from packaging.version import Version

          old = Version("$CURRENT")
          new = Version("$VERSION")

          if new <= old:
              print(f"New version {new} is not greater than current {old}. Aborting.")
              sys.exit(1)
          EOF

          sed -i "s/version = \".*\"/version = \"$VERSION\"/" $FILE

          echo "Updated version from $CURRENT to $VERSION"
      
      - name: Commit updated version
        run: |
          git config --global user.name "actions[bot]"
          git config --global user.email "actions[bot]@github.com"

          git add pyproject.toml
          git commit -m "CI: Updated version to ${{ steps.get_tag.outputs.clean_tag }}"
          git push

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install build
        run: python3 -m pip install build --user

      - name: Build package
        run: python3 -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: testpypi
      url: https://test.pypi.org/p/pymarkdownroh

    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/